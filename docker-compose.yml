services:
  api:
    image: clozera-api:dev
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - ./backend/src:/app/src
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_CONNECTION_STRING: mongodb://mongodb:27017/clozera
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('net').connect(3000, '127.0.0.1').on('connect', function () { this.end(); process.exit(0) }).on('error', function () { process.exit(1) })",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  mongodb:
    image: mongo:8
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  mongodb-data:
